name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # `npm install` (not `npm ci`) because strict clean-install rejects the
      # lockfile over platform-specific optional deps (@tailwindcss/oxide wasm
      # variants) — a known npm cross-platform gap. install respects the lock
      # and reconciles the Linux-only optionals instead of erroring.
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm test
